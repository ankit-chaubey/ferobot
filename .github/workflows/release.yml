name: Release

on:
  # Runs when a bot-api-update PR is merged into main
  pull_request:
    types: [closed]
    branches: [main]

  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: 'true'
        type: boolean
      notes:
        description: 'Release notes for changelog and GitHub release'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: read
  actions: read

jobs:
  release:
    name: Version bump and publish
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'bot-api-update'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Download diff report
        if: github.event_name != 'workflow_dispatch'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: auto-regenerate.yml
          pr: ${{ github.event.pull_request.number }}
          name: diff-report
          path: /tmp
        continue-on-error: true

      - name: Determine bump type
        id: bump-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ github.event.inputs.bump }}"
          else
            # If types or methods were removed, bump minor. Otherwise patch.
            REMOVED=$(python3 -c "
          import json, sys
          try:
              r = json.load(open('/tmp/diff_report.json'))
              print(len(r.get('removed_types', [])) + len(r.get('removed_methods', [])))
          except:
              print(0)
          " 2>/dev/null || echo "0")
            if [ "$REMOVED" -gt "0" ]; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "Bump: $BUMP"

      - name: Read current version
        id: current-ver
        run: |
          VER=$(grep '^version' ferobot/Cargo.toml | head -1 | sed 's/version = \"//;s/\"//')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Current: $VER"

      - name: Bump version
        id: new-ver
        run: |
          cd ferobot
          cargo set-version --bump ${{ steps.bump-type.outputs.bump }}
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/version = \"//;s/\"//')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "New: $VER"

      - name: API version
        id: api-ver
        run: |
          VER=$(python3 -c "import json; print(json.load(open('api.json'))['version'])")
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Update changelog
        run: |
          python3 .github/scripts/update_changelog.py \
            CHANGELOG.md \
            "${{ steps.new-ver.outputs.version }}" \
            "${{ steps.api-ver.outputs.version }}" \
            "$(date +%Y-%m-%d)" \
            --notes "${{ github.event.inputs.notes }}"

      - name: Test
        run: cargo test --workspace

      - name: Commit and push
        run: |
          git config user.name "Ankit Chaubey"
          git config user.email "ankitchaubey.dev@gmail.com"
          git add ferobot/Cargo.toml CHANGELOG.md
          printf 'chore(release): bump to %s\n\nTelegram Bot API: %s\n' \
            "${{ steps.new-ver.outputs.version }}" \
            "${{ steps.api-ver.outputs.version }}" \
            > /tmp/commit_msg.txt
          git commit -F /tmp/commit_msg.txt
          git push origin main

      - name: Tag
        run: |
          TAG="v${{ steps.new-ver.outputs.version }}"
          git tag -a "$TAG" -m "Release $TAG - Telegram Bot API ${{ steps.api-ver.outputs.version }}"
          git push origin "$TAG"

      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new-ver.outputs.version }}
          name: "v${{ steps.new-ver.outputs.version }} - Telegram Bot API ${{ steps.api-ver.outputs.version }}"
          body_path: /tmp/release_notes.md
          generate_release_notes: true
          draft: false

      - name: Copy README
        run: cp README.md ferobot/README.md

      - name: Publish
        if: github.event.inputs.dry_run != 'true'
        run: cargo publish --manifest-path ferobot/Cargo.toml --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Dry run
        if: github.event.inputs.dry_run == 'true'
        run: |
          cargo publish --manifest-path ferobot/Cargo.toml --dry-run --allow-dirty
          echo "Dry run passed. Would have published v${{ steps.new-ver.outputs.version }}"
