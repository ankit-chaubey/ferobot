name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'ferobot/**'
      - 'codegen/**'
      - 'Cargo.toml'
      - 'api.json'
      - '.github/workflows/ci.yml'
      - '.github/scripts/validate_generated.py'
      - '.github/scripts/coverage_report.py'
  pull_request:
    branches: [main]
    paths:
      - 'ferobot/**'
      - 'codegen/**'
      - 'Cargo.toml'
      - 'api.json'
      - '.github/workflows/ci.yml'
      - '.github/scripts/validate_generated.py'
      - '.github/scripts/coverage_report.py'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
        include:
          - os: ubuntu-latest
            rust: nightly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

      - name: Clippy
        if: matrix.rust == 'stable'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Format check
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

  # Runs against the committed api.json, not the live feed.
  # This keeps CI green while an auto-regen PR is still open.
  validate-and-coverage:
    name: Validate and coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Spec version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('api.json'))['version'])")
          echo "Checking against $VERSION"

      - name: Re-run codegen
        run: |
          mkdir -p /tmp/codegen_out
          python3 codegen/codegen.py api.json /tmp/codegen_out

      - name: Check generated files
        run: |
          for file in gen_types.rs gen_methods.rs fluent.rs; do
            if ! diff -q ferobot/src/$file /tmp/codegen_out/$file > /dev/null 2>&1; then
              echo "$file is out of sync with api.json"
              echo "Run: python3 codegen/codegen.py api.json ferobot/src/"
              diff ferobot/src/$file /tmp/codegen_out/$file | head -50
              exit 1
            fi
            echo "$file is in sync"
          done

      - name: Validate coverage
        run: |
          python3 .github/scripts/validate_generated.py \
            api.json \
            ferobot/src/gen_types.rs \
            ferobot/src/gen_methods.rs

      - name: Coverage report
        run: |
          python3 .github/scripts/coverage_report.py \
            api.json \
            ferobot/src/gen_types.rs \
            ferobot/src/gen_methods.rs

      - name: Post coverage
        run: |
          python3 .github/scripts/coverage_report.py \
            api.json \
            ferobot/src/gen_types.rs \
            ferobot/src/gen_methods.rs \
            --markdown >> $GITHUB_STEP_SUMMARY
