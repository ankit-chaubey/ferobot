name: Deploy Docs

# Runs on versioned tags, published releases, and manual trigger.
on:
  push:
    tags:
      - 'v*'

  release:
    types: [published]

  workflow_dispatch:
    inputs:
      message:
        description: 'Reason for manual deploy (optional)'
        required: false
        default: 'Manual docs deploy'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy Sphinx docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Sphinx + extensions
        run: |
          pip install \
            sphinx \
            furo \
            myst-parser \
            sphinx-copybutton

      - name: Generate RST reference pages from api.json
        run: python3 scripts/generate_rst.py

      - name: Build HTML docs
        run: |
          sphinx-build -b html docs/ site/ -W --keep-going
          echo "--- Generated files ---"
          ls -lah site/
          du -sh site/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: |
            docs: deploy ${{ github.ref_name }}

            trigger: ${{ github.event_name }}
            sha: ${{ github.sha }}
