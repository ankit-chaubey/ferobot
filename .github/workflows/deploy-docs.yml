name: Deploy docs

on:
  push:
    tags:
      - 'v*'

  release:
    types: [published]

  workflow_dispatch:
    inputs:
      message:
        description: 'Reason for manual deploy'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            sphinx \
            furo \
            myst-parser \
            sphinx-copybutton \
            markupsafe

      - name: Generate RST pages
        run: python3 scripts/generate_rst.py

      - name: Build docs
        run: |
          sphinx-build -b html docs/ site/ -W --keep-going
          ls -lah site/
          du -sh site/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          cname: ferobot.ankitchaubey.in
          commit_message: |
            docs: deploy ${{ github.ref_name }}

            trigger: ${{ github.event_name }}
            sha: ${{ github.sha }}
